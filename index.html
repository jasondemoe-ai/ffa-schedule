<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session Hall Schedule — Oregon FFA 2026</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222535;
      --border: #2e3248;
      --text: #e8eaf6;
      --muted: #8b90b0;
      --accent: #4f6ef7;
      --blue: #3b82f6;
      --yellow: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
      --purple: #a855f7;
      --cyan: #06b6d4;
      --tab-active: #4f6ef7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.3px;
    }
    .header-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s, border-color 0.15s;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--accent); }


    /* TABS */
    .tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab.active {
      color: var(--tab-active);
      border-bottom-color: var(--tab-active);
    }
    .tab:hover:not(.active) { color: var(--text); }

    /* TODAY badge */
    .today-badge {
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* CONTENT */
    .content {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .day-panel { display: none; }
    .day-panel.active { display: block; }

    .day-header {
      margin-bottom: 20px;
    }
    .day-header h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .day-header .day-desc {
      font-size: 13px;
      color: var(--muted);
    }

    /* CALL TIME BANNER */
    .call-time-banner {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .call-time-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }
    .call-time-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .call-time-value.pending {
      color: var(--muted);
      font-style: italic;
      font-weight: 400;
      font-size: 13px;
    }

    /* SCHEDULE TABLE */
    .schedule {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .schedule-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 10px;
      align-items: start;
      position: relative;
      overflow: hidden;
    }

    .schedule-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }

    .item-setup::before    { background: var(--blue); }
    .item-rehearsal::before { background: var(--yellow); }
    .item-live::before     { background: var(--green); }
    .item-meal::before     { background: var(--red); }
    .item-misc::before     { background: var(--purple); }
    .item-presession::before { background: var(--cyan); }

    .item-time {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      padding-top: 1px;
      white-space: nowrap;
    }

    .item-right {}

    .item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .item-notes {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.6;
    }
    .item-notes ul {
      padding-left: 14px;
      margin-top: 3px;
    }
    .item-notes li {
      margin-bottom: 2px;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 5px;
    }
    .tag-setup    { background: rgba(59,130,246,0.15); color: var(--blue); }
    .tag-rehearsal { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .tag-live     { background: rgba(34,197,94,0.15); color: var(--green); }
    .tag-meal     { background: rgba(239,68,68,0.15); color: var(--red); }
    .tag-misc     { background: rgba(168,85,247,0.15); color: var(--purple); }
    .tag-presession { background: rgba(6,182,212,0.15); color: var(--cyan); }

    /* BREAK ZONE BANNER */
    .break-zone {
      background: repeating-linear-gradient(
        -45deg,
        rgba(168,85,247,0.04),
        rgba(168,85,247,0.04) 6px,
        transparent 6px,
        transparent 14px
      );
      border: 1px dashed rgba(168,85,247,0.35);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 2px 0;
    }
    .break-zone-label {
      font-size: 12px;
      color: var(--purple);
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .break-zone-time {
      font-size: 11px;
      color: rgba(168,85,247,0.6);
      white-space: nowrap;
    }

    /* LAST UPDATED */
    .last-updated {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 30px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .schedule-item {
        grid-template-columns: 70px 1fr;
      }
      .header-title { font-size: 15px; }
    }

    /* FOOTER */
    .day-footer {
      margin-top: 24px;
      padding: 16px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer-contact {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      transition: color 0.15s;
    }
    .footer-contact:hover { color: var(--accent); }
    .footer-name {
      font-weight: 600;
      color: var(--text);
    }
    .footer-phone {
      color: var(--accent);
      font-weight: 600;
    }
    .footer-divider {
      color: var(--border);
    }
  </style>
</head>

const LAST_UPDATED = "March 17, 2026 — 7:30 PM";

const TYPE_CONFIG = {
  setup:      { label: "Setup / Strike",   tagClass: "tag-setup",      itemClass: "item-setup" },
  rehearsal:  { label: "Rehearsal",         tagClass: "tag-rehearsal",   itemClass: "item-rehearsal" },
  live:       { label: "Live / Session",    tagClass: "tag-live",        itemClass: "item-live" },
  meal:       { label: "Meal",              tagClass: "tag-meal",        itemClass: "item-meal" },
  misc:       { label: "Admin",             tagClass: "tag-misc",        itemClass: "item-misc" },
  presession: { label: "Pre-Session",       tagClass: "tag-presession",  itemClass: "item-presession" },
  break:      { label: "Break Window",       tagClass: "tag-misc",        itemClass: "item-misc" },
};

function todayDateStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function buildTabs() {
  const today = todayDateStr();
  const tabsEl = document.getElementById('tabs');
  let firstVisible = -1;
  DAYS.forEach((day, i) => {
    if (day.date < today) return; // hide past days
    const isToday = day.date === today;
    if (firstVisible === -1) firstVisible = i;
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.idx = i;
    tab.innerHTML = day.label + (isToday ? '<span class="today-badge">TODAY</span>' : '');
    tab.addEventListener('click', () => switchTab(i));
    tabsEl.appendChild(tab);
  });
}

function buildContent() {
  const contentEl = document.getElementById('content');
  DAYS.forEach((day, i) => {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + i;



    const callTimeHTML = day.callTime
      ? `<div class="call-time-banner">
           <div class="call-time-label">📞 Call Time</div>
           <div class="call-time-value">${day.callTime}</div>
         </div>`
      : `<div class="call-time-banner">
           <div class="call-time-label">📞 Call Time</div>
           <div class="call-time-value pending">TBD — check back for updates</div>
         </div>`;

    const itemsHTML = day.items.map(item => {
      const cfg = TYPE_CONFIG[item.type] || TYPE_CONFIG.misc;
      let notesHTML = '';
      if (item.notes) {
        if (Array.isArray(item.notes)) {
          notesHTML = `<div class="item-notes"><ul>${item.notes.map(n => `<li>${n}</li>`).join('')}</ul></div>`;
        } else {
          notesHTML = `<div class="item-notes">${item.notes}</div>`;
        }
      }
      if (item.type === 'break') {
        return `<div class="break-zone">
          <div class="break-zone-label">⏸ ${item.title}</div>
          <div class="break-zone-time">${item.notes || ''}</div>
        </div>`;
      }
      return `
        <div class="schedule-item ${cfg.itemClass}">
          <div class="item-time">${item.time}</div>
          <div class="item-right">
            <div class="item-title">${item.title}</div>
            ${notesHTML}
            <span class="tag ${cfg.tagClass}">${cfg.label}</span>
          </div>
        </div>`;
    }).join('');

    panel.innerHTML = `
      <div class="day-header">
        <h2>${day.title}</h2>
        <div class="day-desc">${day.desc}</div>
      </div>
      ${callTimeHTML}
      <div class="schedule">${itemsHTML}</div>
      <div class="last-updated">Last updated: ${LAST_UPDATED}</div>
      <div class="day-footer">
        <a href="tel:+15415565916" class="footer-contact">
          <span class="footer-name">Jason DeMoe</span>
          <span class="footer-divider">|</span>
          <span class="footer-phone">541-556-5916</span>
        </a>
      </div>`;

    contentEl.appendChild(panel);
  });
}

function switchTab(idx, scroll = true) {
  // tabs: compare against stored DAYS index (past days are removed from DOM)
  document.querySelectorAll('.tab').forEach((t) => {
    t.classList.toggle('active', parseInt(t.dataset.idx) === idx);
  });
  // panels: all DAYS panels exist in DOM, so direct index match works
  document.querySelectorAll('.day-panel').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });
  if (scroll) {
    document.getElementById('content').scrollTop = 0;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

buildTabs();
buildContent();

const today = todayDateStr();
// Find today or the next upcoming day
const visibleDays = DAYS.filter(d => d.date >= today);
